# Line Following Configuration Reference
# REFERENCE ONLY: the current demo does not load this file.

# Lime green tape HSV range
# Tune these if detection is unreliable
color:
  lower: [40, 100, 100]   # H, S, V minimums
  upper: [75, 255, 255]   # H, S, V maximums
  description: "Lime green / fluorescent green tape"

# Camera scan strips: [first row, last row, steering weight]
scan_bands:
  far: [240, 280, 0.10]
  mid: [340, 380, 0.30]
  near: [420, 465, 0.60]

# Control parameters
control:
  k_strafe: 0.22         # Pixel error -> sideways correction
  k_turn: 0.08           # Line angle estimate -> heading correction
  forward_speed: 38      # Base forward speed (duty cycle 0-100)
  min_strafe: 18         # Minimum useful sideways correction
  max_strafe: 28         # Maximum sideways correction
  max_turn: 10           # Maximum heading correction
  center_enter: 12       # Start correcting outside this distance from center
  center_exit: 5         # Continue correcting until inside this distance
  heading_deadband: 18   # Pixel difference before turning

# Line detection thresholds
detection:
  min_contour_area: 25   # Ignore smaller connected green regions
  lost_frames: 3         # Stop while confirming the end of the line
  morph_kernel: 5        # Morphology kernel size (noise cleanup)

# Initial line acquisition
search:
  steps: 18
  turn_power: 40
  turn_seconds: 0.10
  settle_seconds: 0.18
  far_max_error: 100     # Far strip must be this close to image center

# Arm position for camera-down view
arm:
  camera_down: [2500, 590, 2450, 1214, 1500]  # [grip, wrist, elbow, shoulder, base]

# Safety
safety:
  timeout: 30  # Max seconds to follow

# Tuning guide:
#
# Robot oscillates (wobbles):
#   - Decrease k_strafe
#   - Decrease k_turn
#   - Decrease forward_speed (slower = smoother)
#
# Robot loses line on curves:
#   - Increase k_turn
#   - Increase max_turn
#   - Decrease forward_speed (more time to react)
#   - Move the scan-strip rows after inspecting line_detect_result.jpg
#
# False detections:
#   - Narrow HSV range (increase S_min or V_min)
#   - Increase morph_kernel (more noise filtering)
#   - Increase min_contour_area (ignore larger noise regions)
#
# Doesn't detect tape:
#   - Widen HSV range (decrease lower, increase upper)
#   - Run test_line_detect.py to check what camera sees
#   - Check lighting (shadows reduce saturation)
