<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zone 584 Controller</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Courier New', monospace;
    padding: 12px;
}

h1 {
    color: #58a6ff;
    text-align: center;
    font-size: 20px;
    margin-bottom: 12px;
    letter-spacing: 2px;
}

.layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 12px;
    max-width: 1000px;
    margin: 0 auto;
}

/* Camera */
.camera-wrap {
    background: #000;
    border: 2px solid #21262d;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 4/3;
}
.camera-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Cards */
.panel { display: flex; flex-direction: column; gap: 10px; }

.card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 12px;
}
.card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* D-pad */
.dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
}
.dpad button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
}
.dpad button:active, .dpad button.pressed {
    background: #388bfd;
    border-color: #58a6ff;
    color: #fff;
}
.dpad .stop-btn {
    background: #21262d;
    font-size: 13px;
    color: #8b949e;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 6px;
    transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:last-child { margin-bottom: 0; }

.btn-run   { background: #238636; color: #fff; }
.btn-stop  { background: #da3633; color: #fff; }
.btn-arm   { background: #1f6feb; color: #fff; font-size: 12px; padding: 8px; }

/* Status dot */
.dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #30363d;
    flex-shrink: 0;
}
.dot.running { background: #3fb950; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Log */
.log {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    height: 200px;
    overflow-y: auto;
    padding: 6px 8px;
    font-size: 10px;
    line-height: 1.6;
}
.log-line { color: #8b949e; border-bottom: 1px solid #161b22; padding: 1px 0; }
.log-line.highlight { color: #3fb950; }
.log-line.error     { color: #f85149; }

/* Key hint */
.hint { font-size: 10px; color: #484f58; text-align: center; margin-top: 6px; }

@media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .camera-wrap { aspect-ratio: 4/3; }
}
</style>
</head>
<body>

<h1>ZONE 584 CONTROLLER</h1>

<div class="layout">

    <!-- Camera feed -->
    <div class="camera-wrap">
        <img src="/stream" alt="Camera">
    </div>

    <div class="panel">

        <!-- Drive -->
        <div class="card">
            <div class="card-title">Drive</div>
            <div class="dpad">
                <div></div>
                <button id="btn-forward"      data-dir="forward"      >&#9650;</button>
                <div></div>
                <button id="btn-strafe-left"  data-dir="strafe_left"  >&#9668;&#9668;</button>
                <button id="btn-stop"         data-dir="stop" class="stop-btn">&#9632; STOP</button>
                <button id="btn-strafe-right" data-dir="strafe_right" >&#9658;&#9658;</button>
                <button id="btn-left"         data-dir="left"         >&#8635;</button>
                <button id="btn-backward"     data-dir="backward"     >&#9660;</button>
                <button id="btn-right"        data-dir="right"        >&#8634;</button>
            </div>
            <div class="hint">W/S=fwd/back &nbsp; A/D=turn &nbsp; Q/E=strafe &nbsp; Space=stop</div>
        </div>

        <!-- Arm -->
        <div class="card">
            <div class="card-title">Arm Position</div>
            <button class="btn btn-arm" onclick="armLookForward()">Look Forward (Sonar Clear)</button>
        </div>

        <!-- Zone 584 Nav -->
        <div class="card">
            <div class="card-title">
                <span class="dot" id="status-dot"></span>
                Zone 584 Navigation
            </div>
            <button class="btn btn-run"  onclick="navStart()">&#9654; Run Zone 584 Nav</button>
            <button class="btn btn-stop" onclick="navStop()">&#9632; Emergency Stop</button>
        </div>

        <!-- Log -->
        <div class="card">
            <div class="card-title">Status Log</div>
            <div class="log" id="log"><div class="log-line" style="color:#484f58">Waiting for navigation...</div></div>
        </div>

    </div>
</div>

<script>
// ── Drive controls ──────────────────────────────────────────────────────────

let activeDir = null;
let driveInterval = null;

function drive(dir) {
    fetch('/drive', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({direction: dir})
    });
}

// Touch + mouse hold
document.querySelectorAll('.dpad button[data-dir]').forEach(btn => {
    const dir = btn.dataset.dir;

    function start(e) {
        e.preventDefault();
        if (dir === 'stop') { drive('stop'); return; }
        btn.classList.add('pressed');
        drive(dir);
        driveInterval = setInterval(() => drive(dir), 120);
    }
    function stop(e) {
        btn.classList.remove('pressed');
        clearInterval(driveInterval);
        if (dir !== 'stop') drive('stop');
    }

    btn.addEventListener('mousedown',  start);
    btn.addEventListener('touchstart', start, {passive: false});
    btn.addEventListener('mouseup',    stop);
    btn.addEventListener('mouseleave', stop);
    btn.addEventListener('touchend',   stop);
});

// Keyboard
const keyMap = {
    'ArrowUp':'forward',   'w':'forward',
    'ArrowDown':'backward','s':'backward',
    'ArrowLeft':'left',    'a':'left',
    'ArrowRight':'right',  'd':'right',
    'q':'strafe_left',     'e':'strafe_right',
    ' ':'stop'
};
const held = {};
document.addEventListener('keydown', e => {
    const dir = keyMap[e.key];
    if (!dir || held[e.key]) return;
    held[e.key] = true;
    drive(dir);
});
document.addEventListener('keyup', e => {
    if (!keyMap[e.key]) return;
    delete held[e.key];
    if (Object.keys(held).length === 0) drive('stop');
});

// ── Arm ─────────────────────────────────────────────────────────────────────

function armLookForward() {
    fetch('/arm/look_forward', {method: 'POST'});
}

// ── Zone 584 Nav ─────────────────────────────────────────────────────────────

function navStart() {
    fetch('/nav/start', {method: 'POST'})
        .then(r => r.json())
        .then(d => { if (!d.ok) alert('Cannot start: ' + d.msg); });
}

function navStop() {
    fetch('/nav/stop', {method: 'POST'});
}

// ── Status log polling ────────────────────────────────────────────────────────

let lastSeq = -1;

function pollLog() {
    fetch('/nav/log')
        .then(r => r.json())
        .then(data => {
            // Update dot
            const dot = document.getElementById('status-dot');
            dot.className = 'dot' + (data.running ? ' running' : '');

            // Only redraw if new messages
            if (data.seq === lastSeq) return;
            lastSeq = data.seq;

            const log = document.getElementById('log');
            if (data.lines.length === 0) return;

            log.innerHTML = data.lines.map(line => {
                let cls = 'log-line';
                if (line.includes('REACHED') || line.includes('SUCCESS')) cls += ' highlight';
                if (line.includes('ERROR') || line.includes('FAILED'))    cls += ' error';
                return '<div class="' + cls + '">' + line + '</div>';
            }).join('');

            log.scrollTop = log.scrollHeight;
        })
        .catch(() => {});
}

setInterval(pollLog, 400);
pollLog();
</script>
</body>
</html>
