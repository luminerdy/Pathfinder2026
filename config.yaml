# Pathfinder Robot Configuration

robot:
  name: "Pathfinder"
  version: "2026"
  platform: "Mobile Robot with Arm"
  hardware: "Raspberry Pi 4 robot with Pi 500 control hub"

# Hardware Configuration
hardware:
  board:
    serial_port: "/dev/ttyAMA0"
    baud_rate: 1000000
    
  servos:
    # Arm servo IDs and ranges
    gripper:
      id: 1
      pulse: [1550, 2500]
      notes: "1550=closed, 2500=open"
    wrist:
      id: 3
      pulse: [500, 2500]
    elbow:
      id: 4
      pulse: [500, 2500]
    shoulder:
      id: 5
      pulse: [500, 2500]
    base:
      id: 6
      pulse: [500, 2500]
      
  chassis:
    type: "mecanum"
    motor_pins:
      front_left: 1
      front_right: 2
      rear_left: 3
      rear_right: 4
    max_speed: 100
    wheel_diameter: 60  # mm
    wheel_base: 150     # mm
    track_width: 120    # mm
    
  camera:
    device: 0
    width: 640
    height: 480
    fps: 30
    flip: true  # Arm is backwards, camera upside down
    
  sonar:
    trigger_pin: 23
    echo_pin: 24
    max_distance: 400  # cm
    
# Vision Configuration
vision:
  apriltag:
    family: "tag36h11"
    size: 0.254  # 254mm = 10 inches (larger for better detection)
    quad_decimate: 2.0
    quad_sigma: 0.0
    decode_sharpening: 0.25
    # Competition field tags, numbered counter-clockwise from Area 1.
    tags:
      582:
        name: "area_1_start_blue"
        description: "Area 1 - start square and blue blocks"
        location: "Bottom-right corner"
      583:
        name: "area_2_red"
        description: "Area 2 - red block area"
        location: "Top-right corner"
      584:
        name: "area_3_yellow"
        description: "Area 3 - yellow block area"
        location: "Top-left corner"
      585:
        name: "area_4_delivery"
        description: "Area 4 - delivery zone"
        location: "Bottom-left corner"
    
# API Configuration
api:
  # Web control is intended for the workshop LAN.
  webserver:
    host: "0.0.0.0"
    port: 8080
    debug: false
    
  streaming:
    host: "0.0.0.0"
    port: 8080
    quality: 80
    
  gamepad:
    enabled: true
    deadzone: 0.1
    
# Movement presets
movement:
  speeds:
    slow: 30
    normal: 60
    fast: 90
    
  turn_rate: 45  # degrees per second
  
# Arm presets (in mm, relative to base)
arm_positions:
  home:
    x: 0
    y: 150
    z: 100
    
  pickup:
    x: 0
    y: 200
    z: 20
    
  carry:
    x: 0
    y: 100
    z: 150
    
  drop:
    x: 0
    y: 180
    z: 50

# Safety limits
safety:
  voltage_min: 6.8
  voltage_warn: 7.0
  temperature_max: 75
  sonar_emergency_stop: 10  # cm
