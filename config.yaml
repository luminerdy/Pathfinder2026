# Pathfinder Robot Configuration

robot:
  name: "Pathfinder"
  version: "2026"
  platform: "Mobile Robot with Arm"
  hardware: "Raspberry Pi 4 robot with Pi 500 control hub"

# Hardware Configuration
hardware:
  board:
    serial_port: "/dev/ttyAMA0"
    baud_rate: 1000000
    
  servos:
    # Arm servo IDs and ranges
    gripper:
      id: 1
      pulse: [1475, 2500]
      notes: "1475=closed, 2500=open"
    wrist:
      id: 3
      pulse: [500, 2500]
    elbow:
      id: 4
      pulse: [500, 2500]
    shoulder:
      id: 5
      pulse: [500, 2500]
    base:
      id: 6
      pulse: [500, 2500]
      
  chassis:
    type: "mecanum"
    motor_pins:
      front_left: 1
      front_right: 2
      rear_left: 3
      rear_right: 4
    max_speed: 100
    wheel_diameter: 60  # mm
    wheel_base: 150     # mm
    track_width: 120    # mm
    
  camera:
    device: 0
    width: 640
    height: 480
    fps: 30
    flip: true  # Arm is backwards, camera upside down
    
  sonar:
    trigger_pin: 23
    echo_pin: 24
    max_distance: 400  # cm
    
# Vision Configuration
vision:
  apriltag:
    family: "tag36h11"  # PathfinderBot standard (was tag16h5)
    size: 0.254  # 254mm = 10 inches (larger for better detection)
    quad_decimate: 2.0
    quad_sigma: 0.0
    decode_sharpening: 0.25
    # Tag assignments (actual tags on field: 578-585, 2 per wall, clockwise)
    tags:
      578:
        name: "home_left"
        description: "Home/Start - Left"
        location: "North wall, 12\" left of center"
      579:
        name: "home_right"
        description: "Home/Start - Right"
        location: "North wall, 12\" right of center"
      580:
        name: "pickup1_left"
        description: "Pickup Zone 1 - Left"
        location: "East wall, 12\" left of center"
      581:
        name: "pickup1_right"
        description: "Pickup Zone 1 - Right"
        location: "East wall, 12\" right of center"
      582:
        name: "pickup2_left"
        description: "Pickup Zone 2 - Left"
        location: "South wall, 12\" left of center"
      583:
        name: "pickup2_right"
        description: "Pickup Zone 2 - Right"
        location: "South wall, 12\" right of center"
      584:
        name: "delivery_left"
        description: "Delivery Zone - Left"
        location: "West wall, 12\" left of center"
      585:
        name: "delivery_right"
        description: "Delivery Zone - Right"
        location: "West wall, 12\" right of center"
    
# API Configuration
api:
  # Web control is intended for the workshop LAN and requires this shared token.
  token_env: "PATHFINDER_WEB_TOKEN"
  default_token: "pathfinder2026"
  webserver:
    host: "0.0.0.0"
    port: 8080
    debug: false
    
  streaming:
    host: "0.0.0.0"
    port: 8080
    quality: 80
    
  gamepad:
    enabled: true
    deadzone: 0.1
    
# Movement presets
movement:
  speeds:
    slow: 30
    normal: 60
    fast: 90
    
  turn_rate: 45  # degrees per second
  
# Arm presets (in mm, relative to base)
arm_positions:
  home:
    x: 0
    y: 150
    z: 100
    
  pickup:
    x: 0
    y: 200
    z: 20
    
  carry:
    x: 0
    y: 100
    z: 150
    
  drop:
    x: 0
    y: 180
    z: 50

# Safety limits
safety:
  voltage_min: 6.8
  voltage_warn: 7.0
  temperature_max: 75
  sonar_emergency_stop: 10  # cm
